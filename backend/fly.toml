app = "isle-of-love-api"
primary_region = "lhr"

[build]

[env]
  PORT = "3001"
  DATABASE_URL = "file:/data/prod.db"

[[mounts]]
  source = "isle_of_love_data"
  destination = "/data"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
